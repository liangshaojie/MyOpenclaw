<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - 现代化任务管理</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1 class="app-title">
                <i class="fas fa-tasks"></i>
                Todo List
            </h1>
            <p class="app-subtitle">高效管理你的日常任务</p>
        </header>

        <main class="main-content">
            <div class="add-task-section">
                <div class="input-container">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="添加新任务..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">
                        <i class="fas fa-plus"></i>
                        添加
                    </button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        全部 <span class="count" id="allCount">0</span>
                    </button>
                    <button class="filter-btn" data-filter="active">
                        进行中 <span class="count" id="activeCount">0</span>
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        已完成 <span class="count" id="completedCount">0</span>
                    </button>
                </div>
            </div>

            <div class="tasks-container">
                <div id="tasksList" class="tasks-list">
                    <!-- 任务项将通过JavaScript动态添加 -->
                </div>
                
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-clipboard-list"></i>
                    <h3>还没有任务</h3>
                    <p>添加你的第一个任务开始吧！</p>
                </div>
            </div>

            <div class="stats-section">
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">总任务：</span>
                        <span class="stat-value" id="totalTasks">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">已完成：</span>
                        <span class="stat-value" id="completedTasks">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">完成率：</span>
                        <span class="stat-value" id="completionRate">0%</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>&copy; 2024 Todo List - 让生活更有序</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
